<div class="order-container">
  <h2>עיבוד הזמנה</h2>

  <div class="form">
    <input
      id="orderName"
      name="orderName"
      type="text"
      [(ngModel)]="orderName"
      placeholder="הזן שם הזמנה..."
      [disabled]="loading"
    />
    <button type="button" (click)="processOrder()" [disabled]="loading || !orderName.trim()">
      {{ loading ? 'מעבד...' : 'שלח הזמנה' }}
    </button>
  </div>

  <div class="success" *ngIf="result">
    <p>✅ ההזמנה <strong>{{ result.orderName }}</strong> עובדה בהצלחה</p>
    <ul>
      <li *ngFor="let item of result.items">
        {{ item.productName }} — הוסר: {{ item.quantityRemoved }}, נשאר: {{ item.newQuantity }}
        <span *ngIf="item.aiTriggered"> 🤖 AI הופעל</span>
      </li>
    </ul>

    <div *ngIf="result.emailDrafts?.length" class="email-drafts">
      <h3>טיוטות מייל לספקים</h3>
      <ul>
        <li *ngFor="let draft of result.emailDrafts">{{ draft }}</li>
      </ul>
    </div>
  </div>
  <p class="error" *ngIf="error">❌ {{ error }}</p>
</div>
